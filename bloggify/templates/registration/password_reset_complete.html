<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloggify | Password Reset Complete</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'bloggify/styles.css' %}">
    <link rel="icon" type="image/svg+xml" href="{% static 'bloggify/icons/favicon.svg' %}">
</head>
<body>
    <main class="auth-page">
        <div class="login-container password-flow">
            <h2>Password Updated</h2>
            <p class="password-flow-copy">Your password has been changed successfully. You can now log in with your new password.</p>

            <div class="password-status password-status-success">
                Your account is ready to use again.
            </div>

            <a class="signup-button" href="{% url 'bloggify:login' %}">Login</a>
        </div>
    </main>
</body>
</html>
