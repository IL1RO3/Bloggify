<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloggify | Password Reset Sent</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'bloggify/styles.css' %}">
</head>
<body>
    <main class="auth-page">
        <div class="login-container password-flow">
            <h2>Check Your Email</h2>
            <p class="password-flow-copy">If an account exists with the email you entered, we sent password reset instructions there.</p>

            <div class="password-status password-status-success">
                Keep this page open or return to login after you use the reset link.
            </div>

            <a class="signup-button" href="{% url 'bloggify:login' %}">Back to Login</a>
        </div>
    </main>
</body>
</html>
