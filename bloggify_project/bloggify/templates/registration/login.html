<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bloggify</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'bloggify/styles.css' %}">
</head>
<body>
    <main class="auth-page">
        <div class="login-container">
            <h2>Login</h2>
            {% if form.errors %}
                <p class="login-error">Your username and password didn't match. Please try again.</p>
            {% endif %}

            <form method="post" action="{% url 'bloggify:login' %}">
                {% csrf_token %}
                <table>
                    <tr>
                        <td>{{ form.username.label_tag }}</td>
                        <td>{{ form.username }}</td>
                    </tr>
                    <tr>
                        <td>{{ form.password.label_tag }}</td>
                        <td>{{ form.password }}</td>
                    </tr>
                </table>
                <input type="submit" value="Login">
                <input type="hidden" name="next" value="{{ next }}">
            </form>
            <p class="no_acc">Don't have an account?</p>
            <a class="signup-button" href="{% url 'bloggify:signup' %}">Sign up</a>
        </div>
    </main>
</body>
</html>
