<VirtualHost *:80>
    ServerName example.com
    ServerAlias www.example.com

    DocumentRoot /srv/bloggify/app

    Alias /static/ /srv/bloggify/app/staticfiles/
    <Directory /srv/bloggify/app/staticfiles>
        Require all granted
    </Directory>

    Alias /media/ /srv/bloggify/app/media/
    <Directory /srv/bloggify/app/media>
        Require all granted
    </Directory>

    WSGIDaemonProcess bloggify \
        python-home=/srv/bloggify/venv \
        python-path=/srv/bloggify/app \
        processes=2 \
        threads=15 \
        display-name=%{GROUP} \
        user=bloggify \
        group=www-data

    WSGIProcessGroup bloggify
    WSGIScriptAlias / /srv/bloggify/app/bloggify_project/wsgi.py

    <Directory /srv/bloggify/app/bloggify_project>
        <Files wsgi.py>
            Require all granted
        </Files>
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/bloggify-error.log
    CustomLog ${APACHE_LOG_DIR}/bloggify-access.log combined
</VirtualHost>
